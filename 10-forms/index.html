<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>CSS Forms</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>CSS Forms</h1>

<p class="intro">

A simple responsive contact form created
using HTML and CSS.

</p>

<div class="form-container">

<form>

<label>Full Name</label>

<input
type="text"
placeholder="Enter your full name"
required>

<label>Email Address</label>

<input
type="email"
placeholder="Enter your email"
required>

<label>Password</label>

<input
type="password"
placeholder="Enter password"
required>

<label>Course</label>

<select>

<option>BCA</option>

<option>B.Tech</option>

<option>MCA</option>

<option>B.Sc</option>

</select>

<label>Message</label>

<textarea
rows="5"
placeholder="Write your message"></textarea>

<button type="submit">

Submit

</button>

</form>

</div>

</body>

</html>
